<h2>图标侧栏视觉样式</h2>
<p class="subtitle">侧栏的图标如何表示「已选中」状态？</p>

<div class="cards">
  <div class="card" data-choice="left-bar" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;padding:16px;height:140px;background:#0a2332;border-radius:8px;align-items:flex-start;justify-content:center;">
        <div style="width:40px;background:rgba(5,25,39,0.95);border:1px solid rgba(160,224,255,0.32);border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:14px;position:relative;">
          <div style="position:absolute;left:0;top:10px;bottom:60%;width:3px;background:#7ee6ff;border-radius:0 2px 2px 0;"></div>
          <div style="width:26px;height:26px;background:rgba(40,105,148,0.5);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📋</div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">🏫</div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📊</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>左侧指示条</h3>
      <p>选中图标左侧显示亮色竖条，图标背景微亮。类似 VS Code</p>
    </div>
  </div>

  <div class="card" data-choice="bg-highlight" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;padding:16px;height:140px;background:#0a2332;border-radius:8px;align-items:flex-start;justify-content:center;">
        <div style="width:40px;background:rgba(5,25,39,0.95);border:1px solid rgba(160,224,255,0.32);border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:14px;">
          <div style="width:26px;height:26px;background:rgba(100,200,255,0.2);border:1px solid rgba(100,200,255,0.4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📋</div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">🏫</div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📊</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>背景高亮</h3>
      <p>选中图标整体背景变亮，带发光边框。醒目、直接</p>
    </div>
  </div>

  <div class="card" data-choice="underlined" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;padding:16px;height:140px;background:#0a2332;border-radius:8px;align-items:flex-start;justify-content:center;">
        <div style="width:40px;background:rgba(5,25,39,0.95);border:1px solid rgba(160,224,255,0.32);border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:14px;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div style="width:26px;height:26px;background:rgba(40,105,148,0.4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📋</div>
            <div style="width:18px;height:2px;background:#7ee6ff;border-radius:1px;"></div>
          </div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">🏫</div>
          <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;">📊</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>底部指示线</h3>
      <p>选中图标下方显示亮色横线。简洁、不干扰图标本身</p>
    </div>
  </div>
</div>
